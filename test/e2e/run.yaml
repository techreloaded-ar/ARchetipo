agents:
  pi-olmx-qwen36:
    tool: pi
    command: pi
    model: olmx/Qwen3.6-35B-A3B-4bit
    args:
      - --print
      - --no-session
      - --model
      - "{model}"
      - "{prompt}"

  pi-go-ds4-flash:
    tool: pi
    command: pi
    model: opencode-go/deepseek-v4-flash
    args:
      - --print
      - --verbose
      - --model
      - "{model}"
      - "{prompt}"

scenarios:

  # Spec + plam  US-001.
  from-prd-to-plan:
    agent: pi-go-ds4-flash
    fixture: fixtures/prd
    prompts:
      - /archetipo-spec
      - /archetipo-plan US-001

  # Implement worktree without integration
  from-plan-to-implement:
    agent: pi-go-ds4-flash
    fixture: fixtures/plan
    archetipo_pre_commands:
      - spec start US-001
    prompts:
      - /archetipo-implement US-001

  # Implement worktree with integration
  worktree-from-plan-to-implement-integrate:
    agent: pi-go-ds4-flash
    fixture: fixtures/worktree-plan
    prompts:
      - /archetipo-implement US-001
    archetipo_post_commands:
      - spec integrate US-001
    verify_integrate:
      - US-001

  # Implement worktree without integration
  worktree-implement-no-integrate:
    agent: pi-go-ds4-flash
    fixture: fixtures/worktree-plan
    archetipo_pre_commands:
      - spec start US-001
    prompts:
      - /archetipo-implement US-001
