body: |
  #### US-000: Existing Product Foundation

  **Epic:** EP-000 | **Priority:** HIGH | **Points:** 1 | **Status:** DONE
  **Blocked by:** -

  **User Story**
  As a developer, I want the existing product to be recognized in the backlog, so that new specs can be added incrementally without regenerating the full backlog.

  **Demonstrates**
  After this spec, the backlog is populated and new specs can be added via extend mode.

  **Acceptance Criteria**
  - [ ] Backlog file exists
  - [ ] Backlog contains at least one spec
