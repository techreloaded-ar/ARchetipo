# Research Workflow - Multi-Type Research System
name: research
description: "Adaptive research workflow supporting multiple research types: market research, deep research prompt generation, technical/architecture evaluation, competitive intelligence, user research, and domain analysis"
author: "AIRchetipo"

# Critical variables from config
config_source: "{project-root}/{air_folder}/aim/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
document_output_language: "{config_source}:document_output_language"
user_skill_level: "{config_source}:user_skill_level"
date: system-generated
current_year: system-generated
current_month: system-generated

# Research behavior - WEB RESEARCH IS DEFAULT
enable_web_research: true

# Source tracking and verification - CRITICAL FOR ACCURACY
require_citations: true
require_source_urls: true
minimum_sources_per_claim: 2
fact_check_critical_data: true

# Workflow components - ROUTER PATTERN
installed_path: "{project-root}/{air_folder}/aim/workflows/1-analysis/research"
instructions: "{installed_path}/instructions-router.md" # Router loads specific instruction sets
validation: "{installed_path}/checklist.md"

# Research type specific instructions (loaded by router)
instructions_market: "{installed_path}/instructions-market.md"
instructions_deep_prompt: "{installed_path}/instructions-deep-prompt.md"
instructions_technical: "{installed_path}/instructions-technical.md"

# Templates (loaded based on research type)
template_market: "{installed_path}/template-market.md"
template_deep_prompt: "{installed_path}/template-deep-prompt.md"
template_technical: "{installed_path}/template-technical.md"

# Output configuration (dynamic based on research type selected in router)
default_output_file: "{output_folder}/research-{{research_type}}-{{date}}.md"

standalone: true

web_bundle:
  name: "research"
  description: "Adaptive research workflow supporting multiple research types: market research, deep research prompt generation, technical/architecture evaluation, competitive intelligence, user research, and domain analysis"
  author: "AIRchetipo"
  instructions: "{air_folder}/aim/workflows/1-analysis/research/instructions-router.md" # Router loads specific instruction sets
  validation: "{air_folder}/aim/workflows/1-analysis/research/checklist.md"
  # Templates (loaded based on research type selected in router)
  template_market: "{air_folder}/aim/workflows/1-analysis/research/template-market.md"
  template_deep_prompt: "{air_folder}/aim/workflows/1-analysis/research/template-deep-prompt.md"
  template_technical: "{air_folder}/aim/workflows/1-analysis/research/template-technical.md"
  web_bundle_files:
    - "{air_folder}/aim/workflows/1-analysis/research/instructions-router.md"
    - "{air_folder}/aim/workflows/1-analysis/research/instructions-market.md"
    - "{air_folder}/aim/workflows/1-analysis/research/instructions-deep-prompt.md"
    - "{air_folder}/aim/workflows/1-analysis/research/instructions-technical.md"
    - "{air_folder}/aim/workflows/1-analysis/research/template-market.md"
    - "{air_folder}/aim/workflows/1-analysis/research/template-deep-prompt.md"
    - "{air_folder}/aim/workflows/1-analysis/research/template-technical.md"
    - "{air_folder}/aim/workflows/1-analysis/research/checklist.md"
    - "{air_folder}/aim/workflows/1-analysis/research/checklist-deep-prompt.md"
    - "{air_folder}/aim/workflows/1-analysis/research/checklist-technical.md"
