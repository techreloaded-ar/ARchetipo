scenarios:
  spec-plan-file:
    description: Generate an initial backlog from the PRD, then plan the first TODO story.
    prd_source: test/PRD.md

backends:
  - id: codex-cli
    type: codex-cli
    tool: codex
    command: codex
    model: gpt-5.5
    scenarios:
      - spec-plan-file

  - id: claude-cli
    type: claude-cli
    tool: claude
    command: claude
    model: sonnet
    scenarios:
      - spec-plan-file

  - id: pi-cli
    type: pi-cli
    tool: pi
    command: pi
    model: openai/gpt-5.5
    thinking: medium
    scenarios:
      - spec-plan-file
