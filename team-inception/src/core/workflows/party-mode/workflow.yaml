# Party Mode - Multi-Agent Group Discussion Workflow
name: "party-mode"
description: "Orchestrates group discussions between all installed AIRchetipo agents, enabling natural multi-agent conversations"
author: "AIRchetipo"

# Critical data sources - manifest and config overrides
agent_manifest: "{project-root}/{air_folder}/_cfg/agent-manifest.csv"
date: system-generated

# This is an interactive action workflow - no template output
template: false
instructions: "{project-root}/{air_folder}/core/workflows/party-mode/instructions.md"

# Exit conditions
exit_triggers:
  - "*exit"

standalone: true

web_bundle:
  name: "party-mode"
  description: "Orchestrates group discussions between all installed AIRchetipo agents, enabling natural multi-agent conversations"
  author: "AIRchetipo"
  template: false
  instructions: "air/core/workflows/party-mode/instructions.md"
  agent_manifest: "air/_cfg/agent-manifest.csv"
  web_bundle_files:
    - "{air_folder}/core/workflows/party-mode/instructions.md"
