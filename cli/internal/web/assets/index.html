<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARchetipo &middot; Backlog Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
        // Apply persisted theme before paint to avoid flash-of-wrong-theme.
        // Default is light; only honor a persisted user choice.
        (function () {
            try {
                var saved = localStorage.getItem('archetipo.theme');
                document.documentElement.dataset.theme = saved || 'light';
            } catch (_) { document.documentElement.dataset.theme = 'light'; }
        })();
    </script>
    <link rel="stylesheet" href="/vendor/easymde.min.css" />
    <link rel="stylesheet" href="/app.css" />
</head>
<body>
    <div class="blueprint-grid" aria-hidden="true"></div>

    <header class="topbar">
        <div class="brand">
            <span class="brand-mark"><em>A</em></span>
            <div class="brand-stack">
                <span class="brand-name">ARchetipo</span>
                <span class="brand-sub">by Tech Reloaded</span>
            </div>
        </div>

        <div class="topbar-stats" id="topbar-stats" aria-live="polite">
            <span class="stat"><span class="stat-num" id="stat-total">—</span><span class="stat-label">stories</span></span>
            <span class="stat-sep">/</span>
            <span class="stat"><span class="stat-num" id="stat-progress">—</span><span class="stat-label">in flight</span></span>
            <span class="stat-sep">/</span>
            <span class="stat"><span class="stat-num" id="stat-done">—</span><span class="stat-label">done</span></span>
        </div>

        <div class="topbar-actions">
            <button id="metrics-btn" type="button" class="ghost-btn">
                <svg class="btn-ico" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true"><path d="M2 13.5h12" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 13.5V9M7 13.5V5.5M10.5 13.5V7.5M14 13.5V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                <span>Metrics</span>
            </button>
            <button id="prd-btn" type="button" class="ghost-btn">
                <svg class="btn-ico" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true"><path d="M3 1.5h7.5L13 4v10.5H3z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M10.5 1.5V4H13" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5.5 7h5M5.5 9.5h5M5.5 12h3" stroke="currentColor" stroke-width="1.2"/></svg>
                <span>PRD</span>
            </button>
            <div class="dropdown" id="mockups-dropdown">
                <button id="mockups-btn" type="button" class="ghost-btn" aria-haspopup="true" aria-expanded="false">
                    <svg class="btn-ico" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="9.5" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 5.5h13M5 13.5h6M8 12v1.5" stroke="currentColor" stroke-width="1.2"/></svg>
                    <span>Mockups</span>
                    <svg class="btn-caret" width="9" height="9" viewBox="0 0 9 9" aria-hidden="true"><path d="M1.5 3l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
                </button>
                <div class="dropdown-menu hidden" id="mockups-menu" role="menu"></div>
            </div>
            <button id="refresh-btn" type="button" class="ghost-btn" aria-label="Refresh board" title="Refresh (R)">
                <svg class="btn-ico" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.88" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M13.5 2v3h-3" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
            <span class="action-sep" aria-hidden="true"></span>
            <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme (T)">
                <svg class="theme-ico theme-ico-sun" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="3" fill="currentColor"/><g stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/></g></svg>
                <svg class="theme-ico theme-ico-moon" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M13.5 10.2a5.5 5.5 0 0 1-7.7-7.7 6 6 0 1 0 7.7 7.7z" fill="currentColor"/></svg>
            </button>
        </div>
    </header>

    <main id="board" class="board" aria-live="polite"></main>

    <footer class="hint-bar" aria-hidden="true">
        <span><kbd>R</kbd> refresh</span>
        <span><kbd>T</kbd> theme</span>
        <span><kbd>Esc</kbd> close</span>
        <span class="hint-spacer"></span>
        <span class="hint-version">ARchetipo by Tech Reloaded</span>
    </footer>

    <div id="modal-root" class="modal-root hidden" role="dialog" aria-modal="true" aria-labelledby="story-editor-title">
        <div class="modal">
            <header class="modal-header">
                <h2 id="story-editor-title" class="modal-title">Story</h2>
                <button id="modal-close" type="button" class="icon-btn" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                </button>
            </header>
            <nav class="modal-tabs" role="tablist">
                <button type="button" class="tab active" data-tab="story" role="tab" aria-selected="true">Story</button>
                <button type="button" class="tab" data-tab="plan" role="tab" aria-selected="false">Plan</button>
                <button type="button" class="tab hidden" data-tab="review" id="review-tab" role="tab" aria-selected="false">Review</button>
            </nav>
            <section class="tab-panel active" data-panel="story">
                <div id="story-view" class="story-view">
                    <div class="story-view-topbar">
                        <div class="story-view-meta" id="story-view-meta"></div>
                        <div class="story-view-actions">
                            <button type="button" id="story-delete-btn" class="ghost-btn danger-ghost-btn">Delete story</button>
                        </div>
                    </div>
                    <h3 class="story-view-title" id="story-view-title"></h3>
                    <div class="markdown-rendered" id="story-body-view"></div>
                    <div class="form-actions">
                        <button type="button" id="story-edit-btn" class="primary-btn">Edit</button>
                    </div>
                </div>
                <form id="story-form" class="form-grid hidden">
                    <label class="field full">
                        <span>Title</span>
                        <input type="text" name="title" required />
                    </label>
                    <label class="field">
                        <span>Priority</span>
                        <select name="priority">
                            <option value="HIGH">HIGH</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="LOW">LOW</option>
                        </select>
                    </label>
                    <label class="field">
                        <span>Story Points</span>
                        <input type="number" name="story_points" min="0" max="100" />
                    </label>
                    <label class="field">
                        <span>Scope</span>
                        <input type="text" name="scope" placeholder="MVP / Growth / Vision" />
                    </label>
                    <label class="field">
                        <span>Blocked by</span>
                        <input type="text" name="blocked_by" placeholder="US-002, US-003" />
                    </label>
                    <label class="field full">
                        <span>Body (markdown)</span>
                        <textarea name="body" rows="14" spellcheck="false"></textarea>
                    </label>
                    <div class="form-actions full">
                        <button type="submit" class="primary-btn">Save story</button>
                        <button type="button" id="story-cancel-btn" class="ghost-btn">Cancel</button>
                        <span class="status-msg" id="story-status"></span>
                    </div>
                </form>
            </section>
            <section class="tab-panel" data-panel="plan">
                <div id="plan-view" class="story-view">
                    <div class="markdown-rendered" id="plan-body-view"></div>
                    <div class="tasks-header">
                        <span>Tasks</span>
                    </div>
                    <table class="tasks-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Deps</th>
                            </tr>
                        </thead>
                        <tbody id="plan-tasks-view"></tbody>
                    </table>
                    <div class="form-actions">
                        <button type="button" id="plan-edit-btn" class="primary-btn">Edit</button>
                    </div>
                </div>
                <form id="plan-form" class="form-grid hidden">
                    <label class="field full">
                        <span>Plan body (markdown)</span>
                        <textarea name="plan_body" rows="10" spellcheck="false"></textarea>
                    </label>
                    <div class="field full">
                        <div class="tasks-header">
                            <span>Tasks</span>
                            <button type="button" id="add-task-btn" class="ghost-btn">+ Add task</button>
                        </div>
                        <table class="tasks-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Deps</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tasks-tbody"></tbody>
                        </table>
                    </div>
                    <div class="form-actions full">
                        <button type="submit" class="primary-btn">Save plan</button>
                        <button type="button" id="plan-cancel-btn" class="ghost-btn">Cancel</button>
                        <span class="status-msg" id="plan-status"></span>
                    </div>
                </form>
            </section>
            <section class="tab-panel" data-panel="review">
                <div class="review-toolbar">
                    <div class="review-branch" id="review-branch"></div>
                    <div class="review-actions">
                        <button type="button" id="review-request-btn" class="ghost-btn" title="Convert comments into Fix tasks and send the spec back to IN PROGRESS">Request changes</button>
                        <button type="button" id="review-integrate-btn" class="primary-btn" title="Merge the branch into base and close the spec">Integrate &amp; close</button>
                    </div>
                </div>
                <div class="review-diff" id="review-diff"></div>
                <span class="status-msg" id="review-status"></span>
            </section>
        </div>
    </div>

    <div id="prd-modal" class="modal-root hidden" role="dialog" aria-modal="true" aria-labelledby="prd-editor-title">
        <div class="modal">
            <header class="modal-header">
                <h2 id="prd-editor-title" class="modal-title">PRD</h2>
                <button id="prd-modal-close" type="button" class="icon-btn" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                </button>
            </header>
            <section class="tab-panel active">
                <div id="prd-view" class="story-view">
                    <div class="markdown-rendered" id="prd-body-view"></div>
                    <div class="form-actions">
                        <button type="button" id="prd-edit-btn" class="primary-btn">Edit</button>
                    </div>
                </div>
                <form id="prd-form" class="form-grid hidden">
                    <label class="field full">
                        <span>PRD body (markdown)</span>
                        <textarea name="prd_body" rows="18" spellcheck="false"></textarea>
                    </label>
                    <div class="form-actions full">
                        <button type="submit" class="primary-btn">Save PRD</button>
                        <button type="button" id="prd-cancel-btn" class="ghost-btn">Cancel</button>
                        <span class="status-msg" id="prd-status"></span>
                    </div>
                </form>
            </section>
        </div>
    </div>

    <div id="metrics-modal" class="modal-root hidden" role="dialog" aria-modal="true" aria-labelledby="metrics-title">
        <div class="modal">
            <header class="modal-header">
                <h2 id="metrics-title" class="modal-title">Metrics</h2>
                <button id="metrics-modal-close" type="button" class="icon-btn" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                </button>
            </header>
            <section class="tab-panel active">
                <div id="metrics-body" class="metrics-body"></div>
                <span class="status-msg" id="metrics-status"></span>
            </section>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/vendor/sortable.min.js"></script>
    <script src="/vendor/marked.min.js"></script>
    <script src="/vendor/easymde.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
